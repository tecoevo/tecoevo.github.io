<div class="color-bar"></div>
<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="nav__inner">
    <a href="{{ '/' | relative_url }}" class="nav__logo">
      Dynamics <span>of Living Systems</span>
    </a>

    <ul class="nav__links">
      {% for item in site.data.navigation.main %}
      <li>
        <a href="{{ item.url | relative_url }}" class="nav__link {% if page.url == item.url %}nav__link--active{% endif %}">
          {{ item.title }}
        </a>
      </li>
      {% endfor %}
    </ul>

    <div class="nav__right">
      <!-- Dark mode toggle -->
      <button class="nav__theme-toggle" aria-label="Toggle dark mode" onclick="toggleTheme()">
        <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="display:none;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
        </svg>
        <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
        </svg>
      </button>

      <button class="nav__mobile-toggle" aria-label="Toggle menu" onclick="document.getElementById('mobile-menu').classList.toggle('is-open')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9h16.5m-16.5 6.75h16.5" />
        </svg>
      </button>
    </div>
  </div>

  <div id="mobile-menu" class="nav__mobile-menu">
    {% for item in site.data.navigation.main %}
    <a href="{{ item.url | relative_url }}" onclick="document.getElementById('mobile-menu').classList.remove('is-open')">
      {{ item.title }}
    </a>
    {% endfor %}
  </div>
</nav>
