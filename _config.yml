# Site Settings
title: "Dynamics of Living Systems"
tagline: "Unifying scales via processes"
description: "Research group of Chaitanya S. Gokhale — Theoretical Biology, Eco-Evolutionary Dynamics"
url: "https://tecoevo.github.io"
baseurl: ""
author: "Chaitanya S. Gokhale"

# Build
markdown: kramdown
permalink: pretty
sass:
  sass_dir: _sass
  style: compressed

# Collections
collections:
  members:
    output: true
    permalink: /team/:name/

# Data
defaults:
  - scope:
      path: ""
      type: "members"
    values:
      layout: "member"

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - _newsite
  - deprecated
  - vendor
