---
layout: default
---
<div class="section">
  <div class="container {% if page.narrow %}container--narrow{% endif %}">
    {% if page.title %}
    <div class="section-header reveal">
      {% if page.eyebrow %}<div class="section-header__eyebrow">{{ page.eyebrow }}</div>{% endif %}
      <h1 class="section-header__title">{{ page.title }}</h1>
      {% if page.subtitle %}<p class="section-header__subtitle">{{ page.subtitle }}</p>{% endif %}
    </div>
    {% endif %}

    <div class="reveal">
      {{ content }}
    </div>
  </div>
</div>
