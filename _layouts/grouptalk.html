---
layout: default
---

<div class="section grouptalk-section">
  <div class="container">

    <!-- Page header -->
    <div class="section-header text-center reveal">
      <div class="section-header__eyebrow">Internal</div>
      <h1 class="section-header__title">{{ page.title | default: "Group Talks" }}</h1>
      {% if page.subtitle %}
      <p class="section-header__subtitle" style="margin: 0 auto;">{{ page.subtitle }}</p>
      {% endif %}
    </div>

    <!-- Format guidelines card -->
    <div class="grouptalk-guidelines reveal">
      <div class="grouptalk-guidelines__header">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
        </svg>
        Format &amp; Guidelines
      </div>
      <div class="grouptalk-guidelines__body">
        {{ content }}
      </div>
    </div>

    <!-- Category legend -->
    <div class="grouptalk-legend reveal">
      <span class="talk-cat talk-cat--owr">OwR</span> Own Research &nbsp;·&nbsp;
      <span class="talk-cat talk-cat--otr">OtR</span> Others' Research &nbsp;·&nbsp;
      <span class="talk-cat talk-cat--jc">JC</span> Journal Club &nbsp;·&nbsp;
      <span class="talk-cat talk-cat--ssk">SSk</span> Soft Skills &nbsp;·&nbsp;
      <span class="talk-cat talk-cat--cpr">CPr</span> Cross-Projects &nbsp;·&nbsp;
      <span class="talk-cat talk-cat--fp">FP</span> Future Planning
    </div>

    <!-- Schedule tables will be injected here by JS -->
    <div id="grouptalk-schedule"></div>

  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // ── Parse today's date for highlighting ─────────────────────────
  var today = new Date();
  today.setHours(0, 0, 0, 0);

  // ── Category chip colour map ─────────────────────────────────────
  var catClass = {
    'owr': 'talk-cat--owr',
    'otr': 'talk-cat--otr',
    'jc':  'talk-cat--jc',
    'ssk': 'talk-cat--ssk',
    'cpr': 'talk-cat--cpr',
    'cpr': 'talk-cat--cpr',
    'fp':  'talk-cat--fp',
  };

  function catChip(raw) {
    if (!raw || !raw.trim()) return '';
    // Normalise: strip markdown bold, trim, lowercase key
    var label = raw.replace(/\*\*/g, '').trim();
    var key   = label.toLowerCase().replace(/[^a-z]/g, '');
    var cls   = catClass[key] || '';
    return '<span class="talk-cat ' + cls + '">' + label + '</span>';
  }

  function parseDate(str) {
    // Try to extract first date in "DD Month YYYY" or "YYYY-MM-DD" forms
    var m;
    // "21 April 2026" style
    m = str.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
    if (m) {
      return new Date(parseInt(m[3]), monthIndex(m[2]), parseInt(m[1]));
    }
    // "2026-04-21" style
    m = str.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (m) {
      return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
    }
    return null;
  }

  var monthNames = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  function monthIndex(name) {
    var n = name.toLowerCase().slice(0,3);
    return monthNames.indexOf(n);
  }

  // ── Source: grab rendered markdown content from guidelines div ──
  var guidelinesEl = document.querySelector('.grouptalk-guidelines__body');
  var scheduleTarget = document.getElementById('grouptalk-schedule');
  if (!guidelinesEl || !scheduleTarget) return;

  // Pull h3s and tables out of the guidelines body
  var nodes = Array.from(guidelinesEl.childNodes);
  var sections = [];
  var currentYear = null;
  var currentTable = null;

  nodes.forEach(function (node) {
    if (node.nodeType !== 1) return;
    var tag = node.tagName.toUpperCase();

    if (tag === 'H3') {
      currentYear = node.textContent.trim();
      currentTable = null;
      sections.push({ year: currentYear, table: null, el: node });
    } else if (tag === 'TABLE') {
      if (sections.length) {
        sections[sections.length - 1].table = node.cloneNode(true);
      }
    }
  });

  // ── Build the schedule HTML ──────────────────────────────────────
  var html = '';
  var isFirstFuture = true;

  sections.forEach(function (sec) {
    html += '<div class="grouptalk-year">';
    html += '<h2 class="grouptalk-year__label">' + sec.year + '</h2>';

    if (!sec.table) {
      html += '</div>';
      return;
    }

    html += '<div class="grouptalk-table-wrap">';
    html += '<table class="grouptalk-table"><thead>';

    // Rebuild thead
    var thead = sec.table.querySelector('thead');
    var tbody = sec.table.querySelector('tbody');
    if (thead) {
      html += '<tr>';
      thead.querySelectorAll('th').forEach(function (th) {
        html += '<th>' + th.innerHTML.trim() + '</th>';
      });
      html += '</tr>';
    }
    html += '</thead><tbody>';

    // Rebuild rows with enhancements
    if (tbody) {
      tbody.querySelectorAll('tr').forEach(function (tr) {
        var cells = tr.querySelectorAll('td');
        if (!cells.length) return;

        var dateStr    = cells[0] ? cells[0].textContent.trim() : '';
        var speaker    = cells[1] ? cells[1].innerHTML.trim()   : '';
        var title      = cells[2] ? cells[2].innerHTML.trim()   : '';
        var category   = cells[3] ? cells[3].textContent.trim() : '';

        var speakerText = cells[1] ? cells[1].textContent.trim().toLowerCase() : '';
        var isBreak  = /^break$|christmas|reformation|german unity|teaching/i.test(speakerText) ||
                       /^break$|christmas|reformation|german unity|teaching/i.test(dateStr);
        var isTba    = speakerText === 'tba';

        // Date parse for future/past styling
        var d = parseDate(dateStr);
        var isFuture = d && d >= today;
        var isToday  = d && d.getTime() === today.getTime();

        // Row class
        var rowClass = 'grouptalk-row';
        if (isBreak)      rowClass += ' grouptalk-row--break';
        else if (isToday) rowClass += ' grouptalk-row--today';
        else if (isFuture) rowClass += ' grouptalk-row--upcoming';

        // Category chip
        var catHtml = catChip(category);

        // Speaker styling: bold if known group member (non-break, non-tba)
        var speakerHtml = isBreak ? '<span class="grouptalk-break-label">' + speaker + '</span>' : speaker;

        html += '<tr class="' + rowClass + '">';
        html += '<td class="grouptalk-cell__date">' + dateStr + '</td>';
        html += '<td class="grouptalk-cell__speaker">' + speakerHtml + '</td>';
        html += '<td class="grouptalk-cell__title">' + (title || '<span class="grouptalk-tba">TBA</span>') + '</td>';
        html += '<td class="grouptalk-cell__cat">' + catHtml + '</td>';
        html += '</tr>';
      });
    }

    html += '</tbody></table></div>';
    html += '</div>';
  });

  scheduleTarget.innerHTML = html;

  // Nothing more needed — schedule is already in DOM

  // Remove the h3/tables from guidelines (they've been moved to schedule)
  var toRemove = guidelinesEl.querySelectorAll('h3, table');
  toRemove.forEach(function (el) { el.remove(); });
});
</script>
